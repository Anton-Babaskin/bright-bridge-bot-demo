<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bright Bridge Bot — Demo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌉</text></svg>">
<style>
  :root{--bg:#0e1621;--chat-bg:#17212b;--header-bg:#1c2938;--my-msg:#2b5278;--bot-msg:#182533;--accent:#3390ec;--accent-hover:#4ea4f6;--text:#f5f5f5;--text-sec:#8b9bab;--green:#4fae4e;--border:#1e2c3a;--input-bg:#242f3d;--btn-bg:#2b5278;--btn-hover:#3a6a9b;--price:#e8b849;--orange:#e8a849}
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;justify-content:center}
  #app{width:100%;max-width:440px;height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
  .header{background:var(--header-bg);padding:12px 16px;display:flex;align-items:center;gap:12;border-bottom:1px solid var(--border);flex-shrink:0}
  .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#1a6bc4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;position:relative;flex-shrink:0}
  .avatar::after{content:'';width:11px;height:11px;border-radius:50%;background:var(--green);position:absolute;bottom:0;right:0;border:2px solid var(--header-bg)}
  .header-name{font-size:15px;font-weight:600}.header-status{font-size:12px;color:var(--green)}
  .demo-badge{font-size:11px;color:var(--text-sec);padding:4px 10px;background:rgba(51,144,236,.1);border-radius:12px;border:1px solid rgba(51,144,236,.2)}
  .chat{flex:1;overflow-y:auto;padding:12px 4px;background:var(--chat-bg);scroll-behavior:smooth}
  .chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .msg-row{display:flex;margin-bottom:6px;padding:0 8px}.msg-row.user{justify-content:flex-end;padding-left:48px}.msg-row.bot{padding-right:48px}
  .bubble{max-width:88%;padding:10px 14px;font-size:14px;line-height:1.5;animation:fadeUp .3s ease}
  .bubble.bot{background:var(--bot-msg);border-radius:4px 18px 18px 18px}.bubble.user{background:var(--my-msg);border-radius:18px 4px 18px 18px}
  .bubble .time{font-size:11px;color:var(--text-sec);text-align:right;margin-top:4px}.bubble .title{font-size:15px;font-weight:600;color:var(--accent-hover);margin-bottom:6px}
  .price-card{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(43,82,120,.3);border-radius:10px;margin-bottom:4px;border:1px solid rgba(51,144,236,.15)}
  .price-card .zone{font-size:13px;font-weight:500}.price-card .note{font-size:11px;color:var(--text-sec)}.price-card .amount{font-size:14px;color:var(--price);font-weight:700;white-space:nowrap}
  .compare-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
  .compare-table th{background:rgba(51,144,236,.15);padding:6px 8px;text-align:left;color:var(--accent-hover);font-weight:600;border-bottom:1px solid var(--border)}
  .compare-table td{padding:6px 8px;border-bottom:1px solid rgba(30,44,58,.6)}.compare-table tr:last-child td{border-bottom:none}
  .highlight-box{margin:8px 0;padding:10px 14px;border-radius:10px;border-left:3px solid}
  .highlight-box.green{background:rgba(79,174,78,.1);border-color:var(--green)}.highlight-box.blue{background:rgba(51,144,236,.1);border-color:var(--accent)}.highlight-box.yellow{background:rgba(232,168,73,.1);border-color:var(--orange)}
  .highlight-box .hl-title{font-size:13px;font-weight:600;margin-bottom:4px}.highlight-box .hl-text{font-size:13px;color:var(--text-sec)}
  .step-item{display:flex;gap:10px;margin:6px 0;align-items:flex-start}
  .step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
  .step-text{font-size:13px;line-height:1.4}
  .faq-item{padding:8px 0;border-bottom:1px solid rgba(30,44,58,.5)}.faq-item:last-child{border-bottom:none}
  .faq-q{font-size:13px;font-weight:600;color:var(--accent-hover);cursor:pointer;display:flex;align-items:center;gap:6}
  .faq-a{font-size:13px;color:var(--text-sec);margin-top:4px;padding-left:20px;display:none;line-height:1.4}.faq-a.open{display:block}
  .faq-arrow{transition:transform .2s;font-size:10px}.faq-arrow.open{transform:rotate(90deg)}
  .contact-box{margin-top:10px;padding:10px 16px;text-align:center;background:rgba(79,174,78,.12);border-radius:10px;border:1px solid rgba(79,174,78,.25)}
  .contact-box .phone{color:var(--green);font-weight:600;font-size:15px}.contact-box .sub{color:var(--text-sec);font-size:12px;margin-top:2px}
  .typing .dots{background:var(--bot-msg);border-radius:4px 18px 18px 18px;padding:12px 18px;color:var(--text-sec);font-size:16px;letter-spacing:3px;animation:pulse 1s infinite;display:inline-block}
  .menu{background:var(--header-bg);padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;max-height:40vh;overflow-y:auto}
  .menu-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .menu-btn{background:var(--btn-bg);color:var(--text);border:none;border-radius:20px;padding:9px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6;font-weight:500;transition:all .15s ease;font-family:inherit}
  .menu-btn:hover{background:var(--btn-hover);transform:translateY(-1px)}.menu-btn.cta{background:var(--accent);box-shadow:0 2px 8px rgba(51,144,236,.3)}.menu-btn.cta:hover{background:var(--accent-hover)}
  .input-bar{background:var(--header-bg);padding:10px 12px;display:flex;align-items:center;gap:10;border-top:1px solid var(--border);flex-shrink:0}
  .input-fake{flex:1;background:var(--input-bg);border-radius:20px;padding:10px 16px;font-size:14px;color:var(--text-sec)}
  .send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;opacity:.5;border:none;color:#fff}
  .tag{background:rgba(51,144,236,.12);padding:4px 10px;border-radius:12px;font-size:12px;display:inline-block;margin:2px}
  a{color:var(--accent-hover);text-decoration:none}a:hover{text-decoration:underline}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="app">
  <div class="header"><div class="avatar">BB</div><div style="flex:1"><div class="header-name">Bright Bridge Bot</div><div class="header-status">online</div></div><div class="demo-badge">DEMO</div></div>
  <div class="chat" id="chat"></div>
  <div class="menu" id="menu" style="display:none"><div class="menu-grid" id="mg"></div></div>
  <div class="input-bar"><div class="input-fake">Выберите пункт меню выше...</div><div class="send-btn">▶</div></div>
</div>
<script>
const S={main:{options:[{id:"registration",emoji:"🏢",label:"Регистрация компании"},{id:"visa",emoji:"🛂",label:"Визы и резидентство"},{id:"banking",emoji:"🏦",label:"Банковское сопровождение"},{id:"pro",emoji:"📋",label:"PRO / Gov. Services"},{id:"docs",emoji:"📄",label:"Документ-клиринг"},{id:"support",emoji:"🤝",label:"Поддержка бизнеса"},{id:"hr",emoji:"👥",label:"HR и кадры"},{id:"marketing",emoji:"📣",label:"Цифровой маркетинг"},{id:"compare",emoji:"⚖️",label:"Free Zone vs Mainland"},{id:"why_uae",emoji:"🇦🇪",label:"Почему ОАЭ?"},{id:"process",emoji:"📍",label:"Как мы работаем"},{id:"faq",emoji:"❓",label:"Частые вопросы"},{id:"consult",emoji:"📞",label:"Бесплатная консультация",cta:1}]},
registration:{title:"🏢 Регистрация компании",html:"Мы регистрируем компании во всех юрисдикциях ОАЭ. <b>15+ лет</b> опыта, <b>20+ бизнесов</b> открыто за 2025 год.<br><br>Выберите тип:",options:[{id:"reg_freezone",emoji:"🌐",label:"Free Zone"},{id:"reg_mainland",emoji:"🏙️",label:"Mainland"},{id:"reg_offshore",emoji:"🌍",label:"Offshore"},{id:"compare",emoji:"⚖️",label:"Сравнить типы"},{id:"main",emoji:"◀️",label:"Главное меню"}]},
reg_freezone:{title:"🌐 Free Zone компании",html:'100% иностранное владение, регистрация от 1 до 7 дней.<div style="margin:8px 0 4px;font-size:13px;font-weight:600;color:var(--accent-hover)">Популярные зоны и стоимость:</div>',prices:[{zone:"Ajman Free Zone",price:"5 565 AED",note:"самый бюджетный"},{zone:"RAKEZ Free Zone",price:"12 500 AED",note:"отличное соотношение цена/качество"},{zone:"Dubai Free Zone",price:"12 900 AED",note:""},{zone:"DAFZA",price:"22 450 AED",note:"международная торговля"},{zone:"DMCC",price:"33 000 AED",note:"золотой стандарт, commodities"}],after:'<div class="highlight-box green"><div class="hl-title">✅ Что включено</div><div class="hl-text">Лицензия, регистрация, виза инвестора, помощь с банковским счётом</div></div><div class="highlight-box blue"><div class="hl-title">⏱ Сроки</div><div class="hl-text">От 1 до 7 рабочих дней до получения лицензии</div></div>',options:[{id:"consult",emoji:"📞",label:"Получить оффер",cta:1},{id:"compare",emoji:"⚖️",label:"Сравнить с Mainland"},{id:"registration",emoji:"◀️",label:"Назад"}]},
reg_mainland:{title:"🏙️ Mainland компания",html:'Полный доступ к локальному рынку ОАЭ. С 2021 года — <b>100% иностранное владение</b>.<div class="highlight-box yellow"><div class="hl-title">💰 Стоимость: от 18 500 AED</div><div class="hl-text">⏱ Сроки: 3–10 рабочих дней</div></div><div style="margin:8px 0 4px;font-size:13px;font-weight:600;color:var(--accent-hover)">Что включено:</div>• Выбор юрисдикции и вида деятельности<br>• Резервация торгового имени<br>• Подготовка и подача документов в DET<br>• Получение торговой лицензии<br>• Инвесторская или рабочая виза<br>• Помощь с открытием корпоративного счёта<div class="highlight-box green"><div class="hl-title">🔑 Ключевое преимущество</div><div class="hl-text">Торговля по всей территории ОАЭ без ограничений, гос. контракты, розница</div></div>',options:[{id:"consult",emoji:"📞",label:"Получить оффер",cta:1},{id:"compare",emoji:"⚖️",label:"Сравнить с Free Zone"},{id:"registration",emoji:"◀️",label:"Назад"}]},
reg_offshore:{title:"🌍 Offshore компания",html:'Идеально для холдинговых структур, защиты активов и международной торговли.<div class="highlight-box yellow"><div class="hl-title">💰 Стоимость: от 9 000 AED</div><div class="hl-text">⏱ Регистрация: до 10 рабочих дней</div></div><div style="margin:8px 0 4px;font-size:13px;font-weight:600;color:var(--accent-hover)">Преимущества:</div>✅ 0% корпоративный налог<br>✅ Полная конфиденциальность<br>✅ Нет требований к офису<br>✅ Защита активов<br>✅ Международные транзакции<div class="highlight-box blue"><div class="hl-title">⚠️ Важно знать</div><div class="hl-text">Offshore компания не может вести деятельность внутри ОАЭ и не даёт визу резидента</div></div>',options:[{id:"consult",emoji:"📞",label:"Получить оффер",cta:1},{id:"registration",emoji:"◀️",label:"Назад"}]},
compare:{title:"⚖️ Free Zone vs Mainland vs Offshore",html:'<table class="compare-table"><tr><th></th><th>Free Zone</th><th>Mainland</th><th>Offshore</th></tr><tr><td><b>Владение</b></td><td>100%</td><td>100%*</td><td>100%</td></tr><tr><td><b>Торговля в ОАЭ</b></td><td>❌ через агента</td><td>✅ без ограничений</td><td>❌</td></tr><tr><td><b>Гос. контракты</b></td><td>❌</td><td>✅</td><td>❌</td></tr><tr><td><b>Виза</b></td><td>✅</td><td>✅</td><td>❌</td></tr><tr><td><b>Офис</b></td><td>Flexi/virtual</td><td>Физический</td><td>Не нужен</td></tr><tr><td><b>От</b></td><td style="color:var(--price)">5 565 AED</td><td style="color:var(--price)">18 500 AED</td><td style="color:var(--price)">9 000 AED</td></tr><tr><td><b>Сроки</b></td><td>1–7 дн</td><td>3–10 дн</td><td>до 10 дн</td></tr><tr><td><b>Налог</b></td><td>0% (условия)</td><td>0–9%</td><td>0%</td></tr></table><div style="font-size:11px;color:var(--text-sec);margin-top:4px">* 100% для большинства видов деятельности с 2021 г.</div><div class="highlight-box blue"><div class="hl-title">💡 Рекомендация</div><div class="hl-text">Запишитесь на бесплатную 30-мин консультацию — подберём юрисдикцию под ваш бизнес</div></div>',options:[{id:"consult",emoji:"📞",label:"Подобрать юрисдикцию",cta:1},{id:"registration",emoji:"🏢",label:"Регистрация"},{id:"main",emoji:"◀️",label:"Главное меню"}]},
visa:{title:"🛂 Визы и резидентство",html:'Полное визовое сопровождение для владельцев бизнеса, сотрудников и семьи.',after:'<div class="price-card"><div><div class="zone">Инвесторская виза</div><div class="note">для владельцев бизнеса, 2-3 года</div></div><div class="amount">от 3 500 AED</div></div><div class="price-card"><div><div class="zone">Золотая виза</div><div class="note">10 лет, для инвесторов и специалистов</div></div><div class="amount">по запросу</div></div><div class="price-card"><div><div class="zone">Рабочая виза</div><div class="note">для сотрудников, 2-3 года</div></div><div class="amount">от 3 000 AED</div></div><div class="price-card"><div><div class="zone">Семейная виза</div><div class="note">супруг/а, дети</div></div><div class="amount">от 3 000 AED</div></div><div class="price-card"><div><div class="zone">Emirates ID</div><div class="note">обязательный документ резидента</div></div><div class="amount">включено</div></div><div class="highlight-box green"><div class="hl-title">✅ Все юрисдикции ОАЭ</div><div class="hl-text">Mainland, Free Zone, Golden Visa — полное сопровождение</div></div>',options:[{id:"consult",emoji:"📞",label:"Оформить визу",cta:1},{id:"main",emoji:"◀️",label:"Главное меню"}]},
banking:{title:"🏦 Банковское сопровождение",html:'Открываем корпоративные счета в <b>20+ банках ОАЭ</b>, включая сложные случаи.<div style="margin:8px 0 4px;font-size:13px;font-weight:600;color:var(--accent-hover)">Банки-партнёры:</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin:4px 0"><span class="tag">Emirates NBD</span><span class="tag">FAB</span><span class="tag">Mashreq</span><span class="tag">ADIB</span><span class="tag">DIB</span><span class="tag">RAKBANK</span><span class="tag">WIO</span><span class="tag">Banque Misr</span></div><div style="margin:10px 0 4px;font-size:13px;font-weight:600;color:var(--accent-hover)">Что входит:</div>• Подбор банка под тип бизнеса<br>• Полный пакет документов<br>• Подготовка к интервью с банком<br>• Решение сложных ситуаций<div class="highlight-box yellow"><div class="hl-title">⚡ Совет</div><div class="hl-text">Начинайте процесс параллельно с регистрацией — сэкономите 2–3 недели</div></div>',options:[{id:"consult",emoji:"📞",label:"Открыть счёт",cta:1},{id:"main",emoji:"◀️",label:"Главное меню"}]},
pro:{title:"📋 PRO / Government Services",html:'Берём на себя все взаимодействия с гос. органами ОАЭ.<div style="margin:8px 0 4px;font-size:13px;font-weight:600;color:var(--accent-hover)">Услуги:</div>• Оформление и продление рабочих виз<br>• Золотая виза (Golden Visa)<br>• Нотариальные услуги<br>• NOC (No Objection Certificate)<br>• Ликвидация компании<br>• Получение и продление лицензий<br>• Внесение изменений в учредительные документы<br>• Пролонгация лицензий и виз<br>• Регистрация в Ejari<div class="highlight-box green"><div class="hl-title">🤝 Без вашего участия</div><div class="hl-text">Вы не тратите время на очереди и бюрократию — всё делаем мы</div></div>',options:[{id:"consult",emoji:"📞",label:"Заказать",cta:1},{id:"main",emoji:"◀️",label:"Главное меню"}]},
docs:{title:"📄 Документ-клиринг",html:'Легализация документов для международного использования.<div style="margin:8px 0 4px;font-size:13px;font-weight:600;color:var(--accent-hover)">Услуги:</div>• Легализация и апостиль<br>• Нотариальные переводы (RU / EN / AR)<br>• Сертификаты происхождения<br>• Attestation в посольствах<br>• Заверение документов MOFA<br>• Нотариальные доверенности',options:[{id:"consult",emoji:"📞",label:"Заказать",cta:1},{id:"main",emoji:"◀️",label:"Главное меню"}]},
support:{title:"🤝 Поддержка бизнеса",html:'Комплексная поддержка на всех этапах развития бизнеса в ОАЭ.<div class="highlight-box blue"><div class="hl-title">📊 Бухгалтерия и налоги</div><div class="hl-text">Бухгалтерия • Налоговое планирование • VAT • Корп. налог (0% до 375K AED, 9% выше)</div></div><div class="highlight-box green"><div class="hl-title">⚖️ Комплаенс</div><div class="hl-text">AML / KYC • ESR отчётность • UBO регистрация • Подготовка к аудитам</div></div><div class="highlight-box yellow"><div class="hl-title">💼 Юридическое сопровождение</div><div class="hl-text">Договоры • Корпоративные изменения • Споры • Трудовое право ОАЭ</div></div>',options:[{id:"consult",emoji:"📞",label:"Узнать подробнее",cta:1},{id:"main",emoji:"◀️",label:"Главное меню"}]},
hr:{title:"👥 HR-консалтинг и управление кадрами",html:'<div style="margin:4px 0;font-size:13px;font-weight:600;color:var(--accent-hover)">Услуги:</div>• Найм сотрудников — подбор, оформление, виза<br>• Увольнение — расчёт EOSB, финальные документы<br>• NDA и трудовые договоры по MOHRE<br>• Медицинское страхование сотрудников<br>• WPS — настройка зарплатных платежей<br>• HR-аутсорсинг — ведение кадрового учёта<div class="highlight-box blue"><div class="hl-title">📋 EOSB</div><div class="hl-text">End of Service Benefits — рассчитаем обязательные выплаты при увольнении по закону ОАЭ</div></div>',options:[{id:"consult",emoji:"📞",label:"Заказать",cta:1},{id:"main",emoji:"◀️",label:"Главное меню"}]},
