<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bright Bridge Bot — Demo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌉</text></svg>">
<style>
  :root {
    --bg: #0e1621;
    --chat-bg: #17212b;
    --header-bg: #1c2938;
    --my-msg: #2b5278;
    --bot-msg: #182533;
    --accent: #3390ec;
    --accent-hover: #4ea4f6;
    --text: #f5f5f5;
    --text-sec: #8b9bab;
    --green: #4fae4e;
    --border: #1e2c3a;
    --input-bg: #242f3d;
    --btn-bg: #2b5278;
    --btn-hover: #3a6a9b;
    --price: #e8b849;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; overflow: hidden;
    display: flex; justify-content: center;
  }
  #app {
    width: 100%; max-width: 440px;
    height: 100dvh; display: flex; flex-direction: column;
    background: var(--bg); position: relative;
  }
  .header {
    background: var(--header-bg); padding: 12px 16px;
    display: flex; align-items: center; gap: 12;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #1a6bc4);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
    position: relative; flex-shrink: 0;
  }
  .avatar::after {
    content: ''; width: 11px; height: 11px; border-radius: 50%;
    background: var(--green); position: absolute; bottom: 0; right: 0;
    border: 2px solid var(--header-bg);
  }
  .header-info { flex: 1; }
  .header-name { font-size: 15px; font-weight: 600; }
  .header-status { font-size: 12px; color: var(--green); }
  .demo-badge {
    font-size: 11px; color: var(--text-sec); padding: 4px 10px;
    background: rgba(51,144,236,0.1); border-radius: 12px;
    border: 1px solid rgba(51,144,236,0.2);
  }
  .chat {
    flex: 1; overflow-y: auto; padding: 12px 4px;
    background: var(--chat-bg); scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg-row { display: flex; margin-bottom: 6px; padding: 0 8px; }
  .msg-row.user { justify-content: flex-end; padding-left: 48px; }
  .msg-row.bot { padding-right: 48px; }
  .bubble {
    max-width: 85%; padding: 10px 14px;
    font-size: 14px; line-height: 1.5;
    animation: fadeUp 0.3s ease;
  }
  .bubble.bot { background: var(--bot-msg); border-radius: 4px 18px 18px 18px; }
  .bubble.user { background: var(--my-msg); border-radius: 18px 4px 18px 18px; }
  .bubble .time {
    font-size: 11px; color: var(--text-sec);
    text-align: right; margin-top: 4px;
  }
  .bubble .title {
    font-size: 15px; font-weight: 600;
    color: var(--accent-hover); margin-bottom: 6px;
  }
  .bubble .welcome-brand { color: var(--accent-hover); font-weight: 600; }
  .bubble .hint { font-size: 13px; color: var(--text-sec); margin-top: 8px; }
  .price-card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; background: rgba(43,82,120,0.3); border-radius: 10px;
    margin-bottom: 4px; border: 1px solid rgba(51,144,236,0.15);
  }
  .price-card .zone { font-size: 13px; font-weight: 500; }
  .price-card .note { font-size: 11px; color: var(--text-sec); }
  .price-card .amount { font-size: 14px; color: var(--price); font-weight: 700; white-space: nowrap; }
  .contact-box {
    margin-top: 10px; padding: 10px 16px; text-align: center;
    background: rgba(79,174,78,0.12); border-radius: 10px;
    border: 1px solid rgba(79,174,78,0.25);
  }
  .contact-box .phone { color: var(--green); font-weight: 600; font-size: 15px; }
  .contact-box .sub { color: var(--text-sec); font-size: 12px; margin-top: 2px; }
  .typing {
    display: flex; margin-bottom: 6px; padding: 0 8px;
  }
  .typing .dots {
    background: var(--bot-msg); border-radius: 4px 18px 18px 18px;
    padding: 12px 18px; color: var(--text-sec); font-size: 16px;
    letter-spacing: 3px; animation: pulse 1s infinite;
  }
  .menu {
    background: var(--header-bg); padding: 10px 12px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .menu-grid {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  }
  .menu-btn {
    background: var(--btn-bg); color: var(--text); border: none;
    border-radius: 20px; padding: 9px 16px; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 6;
    font-weight: 500; transition: all 0.15s ease;
    font-family: inherit;
  }
  .menu-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
  .menu-btn.cta {
    background: var(--accent);
    box-shadow: 0 2px 8px rgba(51,144,236,0.3);
  }
  .menu-btn.cta:hover { background: var(--accent-hover); }
  .input-bar {
    background: var(--header-bg); padding: 10px 12px;
    display: flex; align-items: center; gap: 10;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-fake {
    flex: 1; background: var(--input-bg); border-radius: 20px;
    padding: 10px 16px; font-size: 14px; color: var(--text-sec);
  }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); display: flex;
    align-items: center; justify-content: center;
    font-size: 16px; opacity: 0.5; border: none; color: #fff;
  }
  .pre { white-space: pre-line; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="avatar">BB</div>
    <div class="header-info">
      <div class="header-name">Bright Bridge Bot</div>
      <div class="header-status">online</div>
    </div>
    <div class="demo-badge">DEMO</div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="menu" id="menu" style="display:none">
    <div class="menu-grid" id="menuGrid"></div>
  </div>
  <div class="input-bar">
    <div class="input-fake">Выберите пункт меню выше...</div>
    <div class="send-btn">▶</div>
  </div>
</div>

    ],
  },
  visa: {
    title: "🛂 Визы и резидентство",
    html: `Полное визовое сопровождение для владельцев бизнеса, сотрудников и членов семьи.<br><br>Наши услуги:<br>• Инвесторская виза (2+ года)<br>• Золотая виза (10 лет)<br>• Рабочая виза для сотрудников<br>• Семейная виза<br>• Emirates ID<br><br>Мы оформляем визы во всех юрисдикциях ОАЭ.`,

    ],
  },
  docs: {

    html: `Легализация документов для международного использования.<br><br>• Легализация и апостиль<br>• Нотариальные переводы<br>• Сертификаты происхождения<br>• Attestation в посольствах<br>• Заверение документов MOFA`,
    options: [
      { id: "consult", emoji: "📞", label: "Заказать", cta: true },
      { id: "main", emoji: "◀️", label: "Назад" },
    ],
  },
  support: {
    title: "🤝 Поддержка бизнеса",
    html: `Комплексная поддержка на всех этапах развития вашего бизнеса в ОАЭ.<br><br>📊 <b>Бухгалтерия и налоги:</b><br>• Бухгалтерское сопровождение<br>• Налоговое планирование<br>• VAT регистрация и отчётность<br>• Корпоративный налог (CT)<br><br>⚖️ <b>Комплаенс:</b><br>• AML / KYC процедуры<br>• ESR отчётность<br>• UBO регистрация<br><br>📣 <b>Цифровой маркетинг:</b><br>• Бренд-консалтинг<br>• Запуск и продвижение сайта<br>• Соцсети`,
    options: [
      { id: "consult", emoji: "📞", label: "Узнать подробнее", cta: true },
      { id: "main", emoji: "◀️", label: "Назад" },
    ],
  },
  consult: {
    title: "📞 Бесплатная консультация",
    html: `Первая консультация — <b>бесплатно</b> и ни к чему не обязывает.<br><br>Мы работаем на русском, английском и арабском языках. Клиенты из 15+ стран.`,
    contact: true,
    options: [
      { id: "whatsapp", emoji: "💬", label: "Написать в WhatsApp", cta: true },
      { id: "main", emoji: "🏠", label: "В начало" },
    ],
  },
};

const chat = document.getElementById('chat');
const menu = document.getElementById('menu');
const menuGrid = document.getElementById('menuGrid');
let currentMenu = null;

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function scrollDown() {
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<div class="dots">• • •</div>';
  chat.appendChild(div);
  scrollDown();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function addUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble user">${text}<div class="time">${getTime()} ✓✓</div></div>`;
  chat.appendChild(row);
  scrollDown();
}

function addBotMsg(html) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `<div class="bubble bot">${html}<div class="time">${getTime()}</div></div>`;
  chat.appendChild(row);
  scrollDown();
}

function buildPrices(prices) {
  return prices.map(p =>
    `<div class="price-card">
      <div><div class="zone">${p.zone}</div>${p.note ? `<div class="note">${p.note}</div>` : ''}</div>
      <div class="amount">${p.price}</div>
    </div>`
  ).join('');
}

function buildContact() {
  return `<div class="contact-box">
    <div style="font-size:22px;margin-bottom:4px">📱</div>
    <div class="phone">+971 55 362 2208</div>
    <div class="sub">WhatsApp | Telegram</div>
  </div>
  <div style="margin-top:8px;font-size:13px">
    📩 brightbridgecorservices@gmail.com<br>
    🌐 <a href="https://bright-bridge.net" target="_blank" style="color:var(--accent-hover);text-decoration:none">bright-bridge.net</a><br>
    ✈️ <a href="https://t.me/bright_bridge_csp" target="_blank" style="color:var(--accent-hover);text-decoration:none">@bright_bridge_csp</a>
  </div>`;
}

function showMenu(id) {
  currentMenu = id;
  const svc = SERVICES[id];
  if (!svc || !svc.options) { menu.style.display = 'none'; return; }
  menu.style.display = '';
  menuGrid.innerHTML = '';
  svc.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'menu-btn' + (opt.cta ? ' cta' : '');
    btn.innerHTML = `<span>${opt.emoji}</span><span>${opt.label}</span>`;
    btn.onclick = () => handleOption(opt.id);
    menuGrid.appendChild(btn);
  });
  scrollDown();
}

function handleOption(id) {
  menu.style.display = 'none';

  if (id === 'whatsapp') {
    addUserMsg('💬 Написать в WhatsApp');
    addTyping();
    setTimeout(() => {
      removeTyping();
      addBotMsg(`Отлично! Переходите в WhatsApp для связи с менеджером:
        <div class="contact-box">
          <div style="font-size:22px;margin-bottom:4px">📱</div>
          <a href="https://wa.me/971553622208" target="_blank" style="text-decoration:none">
            <div class="phone">+971 55 362 2208</div>
          </a>
          <div class="sub">Нажмите чтобы открыть WhatsApp</div>
        </div>
        <div style="font-size:12px;color:var(--text-sec);margin-top:8px">🌐 bright-bridge.net</div>`);
      showMenu('consult');
    }, 700);
    return;
  }

  const svc = SERVICES[id];
  if (!svc) return;

  // Find label from current menu
  const curSvc = SERVICES[currentMenu];
  const opt = curSvc?.options?.find(o => o.id === id);
  const label = opt ? `${opt.emoji} ${opt.label}` : id;
  addUserMsg(label);

  addTyping();
  const delay = 600 + Math.random() * 500;

  setTimeout(() => {
    removeTyping();

    if (id === 'main') {
      // Welcome again
      addBotMsg(`Чем ещё могу помочь? 👇`);
      showMenu('main');
      return;
    }

    let html = '';
    if (svc.title) html += `<div class="title">${svc.title}</div>`;
    if (svc.html) html += `<div>${svc.html}</div>`;
    if (svc.prices) html += `<div style="margin-top:10px">${buildPrices(svc.prices)}</div>`;
    if (svc.contact) html += buildContact();

    addBotMsg(html);
    showMenu(id);
  }, delay);
}

// Initial welcome
addTyping();
setTimeout(() => {
  removeTyping();
  addBotMsg(`<div style="font-size:15px;line-height:1.5">
    Привет! 👋 Я бот компании <span class="welcome-brand">Bright Bridge Consulting</span>.
  </div>
  <div style="font-size:14px;line-height:1.5;margin-top:8px">
    Мы помогаем открыть и вести бизнес в ОАЭ уже 15+ лет. Регистрация компаний, визы, банковские счета, комплаенс — всё под ключ.
  </div>
  <div class="hint">Выберите интересующую тему 👇</div>`);
  showMenu('main');
}, 1200);
</script>
</body>
</html>
